<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>TICE — Admin</title>
<style>
:root{--cream:#faf6ee;--ink:#2b2118;--ink2:#6b5a48;--green:#35563b;--amber:#a2643a;--card:#fffdf8;--line:#e5dac6;--danger:#a33b2e}
*{margin:0;padding:0;box-sizing:border-box}
[hidden]{display:none!important}
body{font-family:-apple-system,'Segoe UI',Inter,sans-serif;background:var(--cream);color:var(--ink);padding:24px;max-width:820px;margin:0 auto;line-height:1.5}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:var(--ink2);font-size:.9rem;margin-bottom:20px}
input,select,button{font-family:inherit;font-size:.92rem}
input,select{border:1px solid var(--line);border-radius:10px;padding:9px 12px;background:var(--card);color:var(--ink)}
button{border:0;border-radius:99px;padding:9px 18px;background:var(--green);color:#fff;font-weight:600;cursor:pointer}
button.ghost{background:transparent;color:var(--ink2);border:1px solid var(--line)}
button:disabled{opacity:.5}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.order{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
.order .head{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:6px}
.order .head b{font-size:1.02rem}
.order .date{color:var(--ink2);font-size:.8rem}
.badge{display:inline-block;border-radius:6px;padding:1px 8px;font-size:.72rem;font-weight:700;vertical-align:middle}
.badge.tg{background:#e5f0ff;color:#1c6fb8}
.badge.notg{background:#f2ead9;color:var(--ink2)}
.status-pill{display:inline-block;border-radius:99px;padding:2px 12px;font-size:.78rem;font-weight:700}
.s-new{background:#f2ead9;color:var(--amber)} .s-accepted{background:#eaf0e6;color:var(--green)}
.s-churning{background:#fdf3d8;color:#9a7b1e} .s-delivery{background:#e5f0ff;color:#1c6fb8}
.s-done{background:#e3f2e3;color:#2c7a2c} .s-cancelled{background:#fbe9e6;color:var(--danger)}
pre{white-space:pre-wrap;font-size:.82rem;background:var(--cream);border-radius:10px;padding:10px 12px;margin:10px 0;color:var(--ink2);font-family:ui-monospace,monospace}
.sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:12px}
.sel-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);cursor:pointer;font-size:.8rem;font-weight:600;text-align:left}
.sel-chip:hover{border-color:var(--green)}
.sel-chip.on{border-color:var(--green);background:#eaf0e6}
.sel-chip.off-item{opacity:.45}
.sel-chip .dot{width:16px;height:16px;border-radius:50%;flex:none;border:1px solid var(--line)}
.sel-chip .eye{margin-left:auto;font-size:.72rem}
.m-item{background:var(--card);border:1.5px solid var(--green);border-radius:14px;padding:14px;margin-bottom:10px}
.m-item.hidden-item{opacity:.75}
.m-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.m-head .swatch{width:22px;height:22px;border-radius:50%;border:1px solid var(--line)}
.m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:8px}
.m-grid label,.m-wide label{display:block;font-size:.7rem;font-weight:700;color:var(--ink2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.m-grid input,.m-grid select,.m-wide textarea,.m-wide input{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:.86rem;background:var(--cream);color:var(--ink);font-family:inherit}
.m-wide{margin-bottom:8px}
.m-wide textarea{resize:vertical;min-height:38px}
.m-actions{display:flex;gap:10px;align-items:center}
.m-actions button{padding:5px 12px;font-size:.8rem}
.cb{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:600}
.cb input{width:auto}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.note{color:var(--ink2);font-size:.8rem;margin-top:6px}
.empty{color:var(--ink2);text-align:center;padding:40px 0}
#msg{color:var(--danger);font-size:.86rem;margin:10px 0}
</style>
</head>
<body>
<h1>🍦 TICE — Orders</h1>
<div class="sub">accepted → churning → delivery → done · status changes are pushed to the customer's Telegram if they connected the bot</div>

<div id="login" class="row" hidden>
  <input id="key" type="password" placeholder="Admin key" style="flex:1;min-width:200px">
  <button onclick="enter()">Enter</button>
</div>
<div id="bar" class="row" hidden>
  <button id="tab-orders-btn" onclick="showTab('orders')">📦 Orders</button>
  <button id="tab-menu-btn" class="ghost" onclick="showTab('menu')">🍦 Menu</button>
  <button class="ghost" onclick="load()">↻ Refresh</button>
  <button class="ghost" onclick="logout()">Log out</button>
</div>
<div id="msg"></div>
<div id="list"></div>
<div id="menu" hidden>
  <div class="row" style="position:sticky;top:0;background:var(--cream);padding:8px 0;z-index:5">
    <button onclick="saveMenu()">💾 Save &amp; publish</button>
    <span class="note" id="m-note"></span>
  </div>
  <h2 style="font-size:1.15rem;margin:10px 0">Signature cards <button class="ghost" style="font-size:.78rem;padding:4px 12px" onclick="addRow('signature')">+ add</button></h2>
  <div class="sel-grid" id="m-sig"></div>
  <div id="m-sig-editor"></div>
  <h2 style="font-size:1.15rem;margin:22px 0 10px">Customizer flavours <button class="ghost" style="font-size:.78rem;padding:4px 12px" onclick="addRow('flavours')">+ add</button></h2>
  <div class="sel-grid" id="m-flav"></div>
  <div id="m-flav-editor" style="margin-bottom:30px"></div>
</div>

<script>
const STATUSES = ["new","accepted","churning","delivery","done","cancelled"];
const LABELS = {new:"🆕 New",accepted:"✅ Accepted",churning:"🍦 Churning",delivery:"🛵 On the way",done:"🎉 Delivered",cancelled:"✖️ Cancelled"};
let key = localStorage.getItem("tice_admin_key") || "";

function show(id, on){ document.getElementById(id).hidden = !on; }
function msg(s){ document.getElementById("msg").textContent = s || ""; }
function enter(){
  key = document.getElementById("key").value.trim();
  if(!key) return;
  localStorage.setItem("tice_admin_key", key);
  init();
}
function logout(){
  localStorage.removeItem("tice_admin_key"); key = "";
  document.getElementById("list").innerHTML = "";
  show("login", true); show("bar", false);
}
async function load(){
  msg("");
  let r;
  try{ r = await fetch("/api/admin", {headers:{"x-admin-key":key}}); }
  catch(e){ msg("Network error"); return; }
  if(r.status===401){ logout(); msg("Wrong admin key"); return; }
  const j = await r.json();
  if(!j.ok){ msg("Error: "+(j.error||"unknown")); return; }
  render(j.orders);
}
function render(orders){
  const el = document.getElementById("list");
  if(!orders.length){ el.innerHTML = '<div class="empty">No orders yet. They appear here the moment someone checks out.</div>'; return; }
  el.innerHTML = orders.map(o=>`
    <div class="order" id="o-${o.id}">
      <div class="head">
        <span><b>#${o.id}</b> <span class="status-pill s-${o.status}">${LABELS[o.status]||o.status}</span></span>
        <span class="date">${new Date(o.ts).toLocaleString()} ·
          ${o.chatId?'<span class="badge tg">TG connected</span>':'<span class="badge notg">no TG</span>'}</span>
      </div>
      <pre>${linkify(o.text)}</pre>
      <div class="actions">
        <select id="s-${o.id}" onchange="update('${o.id}')">${STATUSES.map(s=>`<option value="${s}" ${s===o.status?"selected":""}>${LABELS[s]}</option>`).join("")}</select>
        <span class="note" id="n-${o.id}"></span>
      </div>
    </div>`).join("");
}
async function update(id){
  const sel = document.getElementById("s-"+id);
  const status = sel.value;
  const note = document.getElementById("n-"+id);
  sel.disabled = true;
  note.textContent = "saving…";
  let r;
  try{
    r = await fetch("/api/admin", {method:"POST",
      headers:{"Content-Type":"application/json","x-admin-key":key},
      body: JSON.stringify({id, status})});
  }catch(e){ note.textContent = "network error — not saved"; sel.disabled = false; return; }
  const j = await r.json();
  sel.disabled = false;
  if(!j.ok){ note.textContent = "error: "+(j.error||r.status); return; }
  note.textContent = j.notified ? "saved · customer notified in TG ✓" : "saved (customer not connected to TG)";
  const pill = document.querySelector("#o-"+id+" .status-pill");
  if(pill){ pill.className = "status-pill s-"+status; pill.textContent = LABELS[status]; }
}
/* ===== MENU EDITOR ===== */
let M = null; // {signature:[], flavours:[]}
function showTab(tab){
  document.getElementById("list").hidden = tab!=="orders";
  document.getElementById("menu").hidden = tab!=="menu";
  document.getElementById("tab-orders-btn").className = tab==="orders"?"":"ghost";
  document.getElementById("tab-menu-btn").className = tab==="menu"?"":"ghost";
  window._tab = tab;
  if(tab==="menu" && !M) loadMenu();
}
async function loadMenu(){
  let j = null;
  try{ j = await fetch("/api/catalog", {headers:{"x-admin-key":key}}).then(r=>r.json()); }catch(e){}
  if(j && j.ok && j.signature && j.flavours){ M = {signature:j.signature, flavours:j.flavours}; }
  else{
    try{
      const d = await fetch("catalog.json", {cache:"no-store"}).then(r=>r.json());
      M = {signature:d.signature, flavours:d.flavours};
      note("Loaded defaults from catalog.json — hit Save & publish to store them in the database.");
    }catch(e){ note("Could not load catalog"); return; }
  }
  renderMenu();
}
function note(s){ document.getElementById("m-note").textContent = s || ""; }
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
function fld(kind,i,f,label,type="text",style=""){
  const v = M[kind][i][f];
  return `<div style="${style}"><label>${label}</label><input type="${type}" value="${type==="color"?(v||"#cccccc"):esc(v)}" oninput="mset('${kind}',${i},'${f}',${type==="number"?"parseFloat(this.value)||0":"this.value"})"></div>`;
}
function area(kind,i,f,label){
  return `<div class="m-wide"><label>${label}</label><textarea oninput="mset('${kind}',${i},'${f}',this.value)">${esc(M[kind][i][f])}</textarea></div>`;
}
function cb(kind,i,f,label){
  return `<label class="cb"><input type="checkbox" ${M[kind][i][f]?"checked":""} onchange="mset('${kind}',${i},'${f}',this.checked)">${label}</label>`;
}
let msel = {kind:null, idx:null};
function mset(kind,i,f,v){
  M[kind][i][f] = v;
  if(f==="en"||f==="color"||f==="visible") renderSelectors();
  if(f==="visible") renderEditor();
}
function renderMenu(){ renderSelectors(); renderEditor(); }
function renderSelectors(){
  for(const kind of ["signature","flavours"]){
    const el = document.getElementById(kind==="signature"?"m-sig":"m-flav");
    el.innerHTML = M[kind].map((x,i)=>`
      <button class="sel-chip ${msel.kind===kind&&msel.idx===i?'on':''} ${x.visible===false?'off-item':''}" onclick="pickItem('${kind}',${i})">
        <span class="dot" style="background:${x.color||'#ccc'}"></span>
        <span>${esc(x.en)||"(new)"}</span>
        <span class="eye">${x.visible===false?"🚫":""}</span>
      </button>`).join("");
  }
}
function pickItem(kind,i){
  msel = (msel.kind===kind && msel.idx===i) ? {kind:null,idx:null} : {kind,idx:i}; // click again to close
  renderSelectors(); renderEditor();
  if(msel.kind){
    const ed = document.getElementById(kind==="signature"?"m-sig-editor":"m-flav-editor");
    if(ed && ed.scrollIntoView) ed.scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}
function renderEditor(){
  document.getElementById("m-sig-editor").innerHTML = "";
  document.getElementById("m-flav-editor").innerHTML = "";
  if(!msel.kind) return;
  const kind = msel.kind, i = msel.idx, x = M[kind][i];
  if(!x){ msel={kind:null,idx:null}; return; }
  const cats = ["classic","tea","spirit"];
  const catField = kind==="signature" ? "tab" : "g";
  const el = document.getElementById(kind==="signature"?"m-sig-editor":"m-flav-editor");
  el.innerHTML = `
    <div class="m-item ${x.visible===false?'hidden-item':''}">
      <div class="m-head">
        <span class="swatch" style="background:${x.color||'#ccc'}"></span>
        <b>${esc(x.en)||"(new)"}</b>
        <span class="note">${esc(x.id)}</span>
        <span style="flex:1"></span>
        ${cb(kind,i,"visible","visible on site")}
        <button class="ghost" onclick="pickItem('${kind}',${i})">✕ close</button>
      </div>
      <div class="m-grid">
        ${fld(kind,i,"id","id")}
        <div><label>category</label><select onchange="mset('${kind}',${i},'${catField}',this.value)">
          ${cats.map(c=>`<option value="${c}" ${x[catField]===c?"selected":""}>${c}</option>`).join("")}
        </select></div>
        ${fld(kind,i,"en","name (EN)")}
        ${fld(kind,i,"ru","name (RU)")}
        ${kind==="signature"?fld(kind,i,"pricePerKg","price €/kg","number"):fld(kind,i,"price","price delta €/kg","number")}
        ${fld(kind,i,"kcal",kind==="signature"?"kcal/100g":"kcal delta","number")}
        ${fld(kind,i,"color","colour","color")}
        ${kind==="signature"?fld(kind,i,"flavour","customizer flavour id"):""}
      </div>
      ${kind==="signature"
        ? area(kind,i,"dEn","description (EN)")+area(kind,i,"dRu","description (RU)")+area(kind,i,"ingEn","contents (EN)")+area(kind,i,"ingRu","contents (RU)")
        : area(kind,i,"descEn","short description (EN)")+area(kind,i,"descRu","short description (RU)")}
      <div class="m-actions">
        ${cb(kind,i,"adult","18+")} ${cb(kind,i,"ltd","limited")}
        <span style="flex:1"></span>
        ${i>0?`<button class="ghost" onclick="moveUp('${kind}',${i})">↑ move up</button>`:""}
        <button class="ghost" style="color:var(--danger)" onclick="delRow('${kind}',${i})">✕ delete</button>
      </div>
    </div>`;
}
function addRow(kind){
  if(!M){ note("Open the Menu tab first"); return; }
  const item = kind==="signature"
    ? {id:"s_new"+Date.now()%1000, tab:"classic", flavour:"", en:"", ru:"", pricePerKg:35, kcal:210, color:"#cccccc", dEn:"", dRu:"", ingEn:"", ingRu:"", visible:false}
    : {id:"new"+Date.now()%1000, g:"classic", en:"", ru:"", price:0, kcal:0, color:"#cccccc", descEn:"", descRu:"", visible:false};
  M[kind].push(item);
  msel = {kind, idx: M[kind].length-1};
  renderSelectors(); renderEditor();
}
function delRow(kind,i){
  if(!confirm("Delete “"+(M[kind][i].en||M[kind][i].id)+"”?")) return;
  M[kind].splice(i,1);
  msel = {kind:null, idx:null};
  renderSelectors(); renderEditor();
}
function moveUp(kind,i){
  [M[kind][i-1], M[kind][i]] = [M[kind][i], M[kind][i-1]];
  msel = {kind, idx:i-1};
  renderSelectors(); renderEditor();
}
async function saveMenu(){
  note("saving…");
  const bad = [...M.signature, ...M.flavours].find(x=>!x.id || !x.en);
  if(bad){ note("Every item needs at least an id and an EN name"); return; }
  let r;
  try{
    r = await fetch("/api/catalog", {method:"POST",
      headers:{"Content-Type":"application/json","x-admin-key":key},
      body: JSON.stringify(M)});
  }catch(e){ note("network error — not saved"); return; }
  const j = await r.json();
  note(j.ok ? "✓ published — live on the site now" : "error: "+(j.error||r.status));
}

function linkify(s){
  const esc = s.replace(/&/g,"&amp;").replace(/</g,"&lt;");
  return esc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function init(){
  if(key){ show("login", false); show("bar", true); load(); }
  else{ show("login", true); show("bar", false); }
}
init();
// auto-refresh orders every 20s — only on the Orders tab, and never while a dropdown is open/saving
setInterval(()=>{
  if(!key || window._tab==="menu") return;
  const ae = document.activeElement;
  if(ae && (ae.tagName==="SELECT" || ae.disabled===true)) return;
  if(document.querySelector("select:disabled")) return;
  load();
}, 20000);
</script>
</body>
</html>
